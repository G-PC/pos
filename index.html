<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS - Столы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 8px;
            color: #2d3e50;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .table-card {
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: 0.3s;
            border: 3px solid transparent;
        }
        .table-card:hover {
            transform: translateY(-5px);
            border-color: #2d7aff;
            box-shadow: 0 8px 25px rgba(45, 122, 255, 0.15);
        }
        .table-card .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        .table-card .number {
            font-size: 24px;
            font-weight: 700;
            color: #2d3e50;
        }
        .table-card .status {
            font-size: 14px;
            margin-top: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .status.free {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.occupied {
            background: #ffebee;
            color: #c62828;
        }

        .admin-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .admin-links a {
            text-align: center;
            color: #2d7aff;
            text-decoration: none;
            font-weight: 600;
            padding: 10px;
            border: 2px solid #2d7aff;
            border-radius: 10px;
            transition: 0.3s;
        }
        .admin-links a:hover {
            background: #2d7aff;
            color: white;
        }
        .admin-links a.kitchen {
            border-color: #ff6b35;
            color: #ff6b35;
        }
        .admin-links a.kitchen:hover {
            background: #ff6b35;
            color: white;
        }
        .admin-links a.menu-link {
            border-color: #9b59b6;
            color: #9b59b6;
        }
        .admin-links a.menu-link:hover {
            background: #9b59b6;
            color: white;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <h1 id="venueTitle">🍽️ Кафе Уют</h1>
        <p class="subtitle" id="venueSubtitle">Выберите стол для работы</p>

        <div class="tables-grid" id="tablesGrid"></div>

        <div class="admin-links" id="adminLinks">
            <a href="admin.html">⚙️ Управление</a>
            <a href="kitchen.html" class="kitchen">🍳 Кухня (заказы)</a>
            <a href="menu.html" class="menu-link">🍽️ Меню</a>
        </div>
    </div>

    <script src="menu.js"></script>
    <script>
        // ============================================================
        // ВСЯ ЛОГИКА ВНУТРИ
        // ============================================================

        function loadData() {
            const cached = localStorage.getItem('cloudData');
            if (cached) {
                try { return JSON.parse(cached); } catch (e) {}
            }
            const defaultData = {
                venueName: 'Кафе Уют',
                menu: getDefaultMenu(),
                users: { 'sadmin': { password: '123', role: 'sadmin', name: 'Владелец' } },
                tables: { '1': { orders: [], total: 0 }, '2': { orders: [], total: 0 }, '3': { orders: [], total: 0 } },
                stats: { totalOrders: 0, totalRevenue: 0 }
            };
            localStorage.setItem('cloudData', JSON.stringify(defaultData));
            return defaultData;
        }

        function saveData(data) {
            localStorage.setItem('cloudData', JSON.stringify(data));
        }

        function getVenueName() {
            const data = loadData();
            return data.venueName || 'Кафе Уют';
        }

        // ========== РЕНДЕР СТОЛОВ ==========
        function renderTables() {
            const data = loadData();
            const tables = data.tables || {};
            const grid = document.getElementById('tablesGrid');

            grid.innerHTML = '';
            const tableKeys = Object.keys(tables).sort((a, b) => parseInt(a) - parseInt(b));

            for (const key of tableKeys) {
                const i = parseInt(key);
                const table = tables[key] || { orders: [], total: 0 };
                const openOrders = table.orders ? table.orders.filter(o => o.status !== 'closed') : [];
                const orderCount = openOrders.length;
                const isOccupied = orderCount > 0;
                const totalSum = openOrders.reduce((sum, o) => sum + o.total, 0);

                const card = document.createElement('div');
                card.className = 'table-card';
                card.innerHTML = `
                    <span class="icon">${isOccupied ? '🟢' : '⚪'}</span>
                    <div class="number">Стол ${i}</div>
                    <span class="status ${isOccupied ? 'occupied' : 'free'}">
                        ${isOccupied ? `Занят (${orderCount} зак.)` : 'Свободен'}
                    </span>
                    ${isOccupied ? `<div style="margin-top:8px;font-weight:600;color:#2d7aff;">${totalSum} ₽</div>` : ''}
                `;
                card.addEventListener('click', () => {
                    window.location.href = `table.html?table=${i}`;
                });
                grid.appendChild(card);
            }

            document.getElementById('venueTitle').textContent = '🍽️ ' + getVenueName();
        }

        // ========== ЗАПУСК ==========
        renderTables();

        console.log('✅ POS система загружена!');
    </script>

</body>
</html>
