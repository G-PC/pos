<script src="github.js"></script>
<script>
    // ========== ПРОВЕРКА ПРАВ ==========
    function getCurrentUser() {
        const data = localStorage.getItem('currentUser');
        return data ? JSON.parse(data) : null;
    }

    const user = getCurrentUser();
    if (!user || (user.role !== 'sadmin' && user.role !== 'Официант')) {
        alert('У вас нет прав для работы с заказами');
        window.location.href = 'index.html';
    }

    // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С ДАННЫМИ ==========
    async function loadData() {
        try {
            const data = await GitHubAPI.getData();
            return data;
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            const cached = localStorage.getItem('cloudData');
            if (cached) return JSON.parse(cached);
            return GitHubAPI.getDefaultData();
        }
    }

    async function saveData(data) {
        try {
            await GitHubAPI.updateData(data);
            return true;
        } catch (error) {
            console.error('Ошибка сохранения:', error);
            return false;
        }
    }

    // ========== ЗАГРУЗКА И СОХРАНЕНИЕ ЗАКАЗОВ ==========
    async function loadTableOrders(tableNumber) {
        const data = await loadData();
        const tables = data.tables || {};
        const table = tables[tableNumber] || { orders: [], total: 0 };
        const openOrders = table.orders ? table.orders.filter(o => o.status !== 'closed') : [];
        if (openOrders.length > 0) {
            const lastOrder = openOrders[openOrders.length - 1];
            if (lastOrder && lastOrder.status !== 'closed') {
                return lastOrder.items || [];
            }
        }
        return [];
    }

    async function saveTableOrder(tableNumber, cart) {
        const data = await loadData();
        if (!data.tables) data.tables = {};
        if (!data.tables[tableNumber]) {
            data.tables[tableNumber] = { orders: [], total: 0 };
        }
        
        const table = data.tables[tableNumber];
        // Находим открытый заказ
        let openOrder = null;
        let openIndex = -1;
        const openOrders = table.orders.filter(o => o.status !== 'closed');
        if (openOrders.length > 0) {
            const lastOpen = openOrders[openOrders.length - 1];
            openIndex = table.orders.indexOf(lastOpen);
            openOrder = lastOpen;
        }

        if (openOrder && cart.length > 0) {
            openOrder.items = cart.map(item => ({ ...item }));
            openOrder.total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            table.orders[openIndex] = openOrder;
        } else if (cart.length > 0) {
            table.orders.push({
                items: cart.map(item => ({ ...item })),
                total: cart.reduce((sum, item) => sum + item.price * item.quantity, 0),
                status: 'open',
                timestamp: new Date().toISOString()
            });
        }

        // Обновляем общую сумму
        table.total = table.orders
            .filter(o => o.status !== 'closed')
            .reduce((sum, o) => sum + o.total, 0);

        await saveData(data);
        return data;
    }

    // ========== ОСТАЛЬНОЙ КОД ИЗ table.html ==========
    // ... (весь остальной код table.html, но с использованием loadData() и saveData())
</script>
