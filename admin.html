<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Административная панель</h1>

    <!-- Категории -->
    <h2>Категории</h2>
    <input type="text" placeholder="Название категории" id="new-category-input">
    <button onclick="createCategory()">Добавить</button>
    <ul id="categories-list"></ul>

    <!-- Блюда -->
    <h2>Блюда</h2>
    <form onsubmit="return false;" id="dish-form">
        <label>Категория:</label>
        <select id="category-select"></select>
        <br>
        <label>Название:</label>
        <input type="text" required id="dish-name">
        <br>
        <label>Цена:</label>
        <input type="number" step="0.01" required id="dish-price">
        <br>
        <button onclick="saveDish()">Сохранить</button>
    </form>

    <!-- Модификаторы -->
    <h2>Модификаторы</h2>
    <input type="text" placeholder="Название модификатора" id="modifier-input">
    <button onclick="createModifier()">Добавить</button>
    <ul id="modifiers-list"></ul>

    <script src="/script.js"></script>
</body>
</html>
